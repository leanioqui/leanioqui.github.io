<!DOCTYPE html>
<html lang="es"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leandro Quintela | Sistemas & IA</title>
    <style>
        /* DEFINICIÓN DE VARIABLES: Como en C++, definimos constantes para no repetir valores */
        :root {
            --apple-black: #1d1d1f;
            --apple-grey: #86868b;
            --apple-bg: #f5f5f7;
            --py-blue: #306998;
            --py-yellow: #FFD43B;
            --cpp-blue: #00599C;
            --arduino-blue: #00979D;
        }

        body {
            margin: 0;
            /* SYSTEM STACK: Usa la fuente nativa del SO (San Francisco en Mac, Segoe en Win). 
               Es lo que hace que la web parezca una "App" del sistema. */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: var(--apple-black);
            line-height: 1.5;
            /* Suavizado de tipografía para pantallas de alta densidad (Retina) */
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 980px; /* Ancho estándar de las landing pages de Apple */
            margin: 0 auto;
            padding: 0 22px;
        }

        #hero {
            padding: 120px 0 60px;
            text-align: center;
        }

        h1 {
            font-size: 56px;
            font-weight: 700;
            letter-spacing: -0.005em; /* Un ajuste milimétrico para que el título se vea más compacto */
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 24px;
            color: var(--apple-grey);
            font-weight: 400;
        }

        /* GRID: El cerebro del diseño responsive */
        .grid {
            display: grid;
            /* LÓGICA INTELIGENTE: "Repetí columnas siempre que midan al menos 300px, 
               sino, mandalas abajo". El '1fr' hace que ocupen el resto del espacio. */
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 80px;
        }

        /* LAS CARDS: El contenedor de tus proyectos */
        .card {
            background: var(--apple-bg);
            padding: 40px;
            border-radius: 28px; /* El radio de curvatura "squircle" típico de iOS */
            
            /* TRANSITION: Esta es la clave. Le dice al navegador: 
               "Cualquier cambio de estilo (como el transform) hacelo en 0.3 segundos de forma suave". */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            
            text-decoration: none;
            color: inherit;
        }

        /* EFECTO HOVER: Qué pasa cuando el mouse entra en el área de la card */
        .card:hover {
            /* SCALE: Agranda la tarjeta un 2%. Al tener la 'transition' arriba, se ve fluido. */
            transform: scale(1.02);
            /* Opcional: Podés agregar una sombra sutil para dar efecto de profundidad */
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        /* --- Lógica de Colores Específicos para el Título en Hover --- */

        /* 1. Definimos la transición en el H3 base para que el cambio de color sea suave.*/

/* 1. Modificamos la base de todos los h3 */
        .card h3 {
            font-size: 28px;
            margin: 0 0 10px;
            /* CLAVE: La caja ahora mide lo mismo que el texto */
            display: inline-block;
            /* Cambiamos 'color' por 'all' para que la transición 
               también afecte al fondo y al recorte del texto, Si no se pone esto, el color cambia "de golpe"  */
            transition: all 0.3s ease; 
        }
        
        /* 2. El nuevo efecto para Python (Gradiente Diagonal) */
        .card-python:hover h3 {
            /* Colores oficiales de Python en diagonal */
            background: linear-gradient(135deg, var(--py-blue) 50%, var(--py-yellow) 50%);
            
            /* Recorte de fondo al texto */
            -webkit-background-clip: text;
            background-clip: text;
            
            /* Hacemos el texto transparente para que se vea el fondo */
            -webkit-text-fill-color: transparent;
            color: transparent;
            
            /* Agregamos un filtro de drop-shadow sutil. 
            A diferencia del text-shadow, este se aplica AL RECORTE del texto, 
            haciendo que los colores "salten" más del fondo. */
            filter: drop-shadow(0px 2px 2px rgba(0,0,0,0.15));

            /* Quitamos la sombra para que el corte diagonal sea nítido */
            text-shadow: none;
        }

        /* 3. Cuando el padre 'card-cpp' está en hover, buscá su h3 y usá su color (#00599C) */
        .card-cpp:hover h3 {
            color: var(--cpp-blue);
        }

        /* 4. Cuando el padre 'card-arduino' está en hover, buscá su h3 y usá su color (#00979D) */
        .card-arduino:hover h3 {
            color: var(--arduino-blue);
        }

        /* SECCIÓN DE BOTONES */
        .buttons {
            margin-top: 100px;
            text-align: center;
            padding-bottom: 100px;
        }

        .btn {
            display: inline-block;
            padding: 12px 22px;
            border-radius: 980px; /* Botón tipo "pastilla" de Apple */
            font-weight: 400;
            text-decoration: none;
            margin: 10px;
            /* Animación simple de opacidad */
            transition: opacity 0.2s ease;
        }

        .btn-primary { background: #0071e3; color: white; }
        .btn-dark { background: var(--apple-black); color: white; }

        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="container">
        <section id="hero">
            <h1>Leandro Quintela</h1>
            <p class="subtitle">Ingeniería en Sistemas | Futuro PhD en IA</p>
        </section>

        <section class="grid">
            <div class="card card-python">
                <h3>Python</h3>
                <p>Gestión de Impacto Ambiental. Scrapping y base de datos SQLite.</p>
            </div>
            <div class="card card-cpp">
                <h3>C++</h3>
                <p>Algoritmos avanzados y estructuras de datos de la UTN.</p>
            </div>
            <div class="card card-arduino">
                <h3>Arduino</h3>
                <p>Lógica de control y automatización mediante sistemas embebidos.</p>
            </div>
        </section>

        <section class="buttons">
            <a href="https://www.linkedin.com/in/leandro-nicol%C3%A1s-quintela-2064b7231/" class="btn btn-primary">LinkedIn</a>
            <a href="mailto:quintela.leandro@gmail.com" class="btn btn-dark">Email</a>
        </section>
    </div>

</body>
</html>
